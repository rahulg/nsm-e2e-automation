[pytest]
testpaths = tests
python_files = test_*.py
python_classes = TestE2E*
python_functions = test_*
markers =
    e2e: End-to-end cross-portal tests
    core: Core workflow tests (E2E-001 through E2E-006)
    alternate: Alternate/exception flow tests (E2E-007 through E2E-012)
    multiuser: Multi-user and role-based tests (E2E-013 through E2E-016)
    edge: Edge case tests (E2E-017 through E2E-047)
    critical: Critical priority tests
    high: High priority tests
    medium: Medium priority tests
    smoke: Smoke tests (quick subset)
    paper_form: Paper form workflow tests
    payment: Payment-related tests
    nordis: Nordis mailing integration tests
    performance: Performance threshold tests
    report: Report generation tests
addopts = -v --tb=short
